name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pytest numpy opencv-python scikit-learn matplotlib pillow tqdm
          python -m pip install -e .
          # Uninstall heavy packages to avoid CI timeouts
          python -m pip uninstall -y torch torchvision facenet-pytorch mtcnn faiss-cpu || true

      - name: Run tests
        run: pytest -v
